spring.application.name=api-gateway
server.port=8080

# URLs dos serviços
services.upload-service=${SERVICES_UPLOAD_SERVICE:http://localhost:8081}
services.report-service=${SERVICES_REPORT_SERVICE:http://localhost:8083}

# Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Actuator
management.endpoints.web.exposure.include=health,info