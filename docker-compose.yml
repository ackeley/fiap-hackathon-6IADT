services:

  postgres-upload:
    image: postgres:16
    container_name: upload-db
    environment:
      POSTGRES_DB: upload_db
      POSTGRES_USER: upload_user
      POSTGRES_PASSWORD: upload_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_upload_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U upload_user -d upload_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: report-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  upload-service:
    build:
      context: ./upload-service/upload-service
      dockerfile: Dockerfile
    container_name: upload-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-upload:5432/upload_db?sslmode=disable
      SPRING_DATASOURCE_USERNAME: upload_user
      SPRING_DATASOURCE_PASSWORD: upload_pass
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres-upload:
        condition: service_healthy
      kafka:
        condition: service_healthy

  processing-service:
    build:
      context: ./processing-service/processing-service
      dockerfile: Dockerfile
    container_name: processing-service
    ports:
      - "8082:8082"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      kafka:
        condition: service_healthy

  report-service:
    build:
      context: ./report-service/report-service
      dockerfile: Dockerfile
    container_name: report-service
    ports:
      - "8083:8083"
    environment:
      SPRING_DATA_MONGODB_HOST: mongodb
      SPRING_DATA_MONGODB_PORT: 27017
      SPRING_DATA_MONGODB_DATABASE: report_db
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/report_db
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy

  api-gateway:
    build:
      context: ./api-gateway/api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      SERVICES_UPLOAD_SERVICE: http://upload-service:8081
      SERVICES_REPORT_SERVICE: http://report-service:8083
    depends_on:
      - upload-service
      - report-service

volumes:
  postgres_upload_data:
  mongodb_data: